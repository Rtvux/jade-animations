<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jade AI — Design Preview</title>
<link rel="stylesheet" href="jade-animations.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .phone {
    width: 100%;
    max-width: 393px;
    min-height: 100vh;
    background: #0f0f0f;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ===== STATUS BAR ===== */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 8px;
    height: 54px;
  }
  .status-time {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.2px;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-icons svg { display: block; }

  /* ===== NAV BAR ===== */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 12px;
    border-bottom: 1px solid #1a1a1a;
    position: relative;
  }
  .nav-back {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #fff;
    font-size: 20px;
    border-radius: 50%;
    transition: background 0.15s;
  }
  .nav-back:hover { background: rgba(255,255,255,0.06); }

  .nav-center {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    transition: background 0.15s;
    user-select: none;
  }
  .nav-center:hover { background: rgba(255,255,255,0.06); }
  .nav-center.open { background: rgba(255,255,255,0.08); }

  .jade-title {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
  }
  .chevron {
    width: 12px;
    height: 12px;
    transition: transform 0.2s;
  }
  .nav-center.open .chevron { transform: rotate(180deg); }

  .nav-chat {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.15s;
    cursor: pointer;
  }
  .nav-chat:hover { background: rgba(255,255,255,0.06); }

  /* ===== DROPDOWN ===== */
  .dropdown-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 90;
  }
  .dropdown-overlay.open { display: block; }

  .dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: min(320px, calc(100vw - 32px));
    max-height: 420px;
    overflow-y: auto;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    padding: 8px 0;
  }
  .dropdown.open { display: block; }

  .dropdown-group {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    color: #2dd4bf;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .dropdown-item {
    padding: 8px 16px;
    font-size: 13px;
    color: #ccc;
    cursor: pointer;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dropdown-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .dropdown-item.active { color: #2dd4bf; background: rgba(45,212,191,0.08); }
  .dropdown-item .item-num {
    font-size: 10px;
    color: #555;
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .dropdown::-webkit-scrollbar { width: 4px; }
  .dropdown::-webkit-scrollbar-track { background: transparent; }
  .dropdown::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    gap: 16px;
  }

  .loader-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .loader-slot {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Override icon sizes for 48px loader slot */
  .loader-slot .icon-wrap,
  .loader-slot .icon-container {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .loader-slot .cv-icon,
  .loader-slot .tr-icon,
  .loader-slot .jd-icon,
  .loader-slot .l-icon {
    width: 48px;
    height: 48px;
  }
  .loader-slot .ca-icon {
    width: 42px;
    height: 48px;
  }
  .loader-slot .eye-icon {
    width: 48px;
    height: auto;
  }
  .loader-slot .halftone {
    transform: scale(0.82);
  }

  /* Default spinner */
  .default-loader {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #2dd4bf;
    border-radius: 50%;
    animation: defaultSpin 1s linear infinite;
  }
  @keyframes defaultSpin {
    to { transform: rotate(360deg); }
  }

  .generating-text {
    font-size: 16px;
    font-weight: 500;
    font-style: italic;
    color: #fff;
    text-align: center;
  }
  .subtitle-text {
    font-size: 13px;
    color: #555;
    text-align: center;
    margin-top: 8px;
  }

  /* ===== CHAT INPUT ===== */
  .chat-area {
    padding: 12px 16px 8px;
  }
  .input-bar {
    display: flex;
    align-items: center;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 28px;
    padding: 10px 8px 10px 20px;
    gap: 8px;
  }
  .input-placeholder {
    flex: 1;
    font-size: 14px;
    color: #555;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #14b8a6;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .send-btn:hover { background: #2dd4bf; }

  /* ===== HOME INDICATOR ===== */
  .home-area {
    display: flex;
    justify-content: center;
    padding: 8px 0 12px;
  }
  .home-indicator {
    width: 134px;
    height: 5px;
    background: #fff;
    border-radius: 3px;
    opacity: 0.2;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 393px) {
    .status-bar { padding: 14px 16px 8px; }
    .nav-bar { padding: 8px 12px 12px; }
    .main-content { padding: 0 16px; }
    .chat-area { padding: 12px 12px 8px; }
    .generating-text { font-size: 15px; }
    .input-placeholder { font-size: 13px; }
  }

  @media (max-width: 320px) {
    .jade-title { font-size: 12px; letter-spacing: 2px; }
    .generating-text { font-size: 14px; }
    .subtitle-text { font-size: 12px; }
    .input-placeholder { font-size: 12px; }
    .nav-back, .nav-chat { width: 36px; height: 36px; }
    .send-btn { width: 32px; height: 32px; }
    .home-indicator { width: 100px; }
  }
</style>
</head>

// ===== DROPDOWN LOGIC =====
let currentActive = null;

function buildDropdown() {
  const dd = document.getElementById('dropdown');
  let html = '';

  // Default option
  html += '<div class="dropdown-item active" data-default="true" onclick="setDefault(this)"><span class="item-num"></span>Default Spinner</div>';

  for (const [key, icon] of Object.entries(ICONS)) {
    html += `<div class="dropdown-group">${icon.label}</div>`;
    icon.anims.forEach((a, i) => {
      html += `<div class="dropdown-item" data-icon="${key}" data-idx="${i}" onclick="selectAnim(this,'${key}',${i})"><span class="item-num">${String(i+1).padStart(2,'0')}</span>${a.name}</div>`;
    });
  }

  dd.innerHTML = html;
}

function toggleDropdown() {
  const dd = document.getElementById('dropdown');
  const nav = document.getElementById('navCenter');
  const overlay = document.getElementById('dropdownOverlay');
  const isOpen = dd.classList.contains('open');

  dd.classList.toggle('open', !isOpen);
  nav.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
}

function clearActive() {
  document.querySelectorAll('.dropdown-item.active').forEach(el => el.classList.remove('active'));
}

function setDefault(el) {
  clearActive();
  el.classList.add('active');
  document.getElementById('loaderSlot').innerHTML = '<div class="default-loader"></div>';
  toggleDropdown();
}

function selectAnim(el, iconKey, idx) {
  clearActive();
  el.classList.add('active');

  const icon = ICONS[iconKey];
  const anim = icon.anims[idx];
  const slot = document.getElementById('loaderSlot');

  const wrapClass = anim.wrapEl || 'icon-wrap';
  let inner = '';

  if (icon.divTemplate) {
    inner = icon.divTemplate;
  } else {
    inner = anim.svg || icon.svg;
  }

  const extra = anim.extra || '';
  slot.innerHTML = `<div class="${wrapClass} ${anim.cls}">${extra}${inner}</div>`;

  toggleDropdown();
}

// Init
buildDropdown();

</script>

</body>
</html>
